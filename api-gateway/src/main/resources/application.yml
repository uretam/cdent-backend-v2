server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ms-pacientes
          uri: http://localhost:8081
          predicates:
            - Path=/api/pacientes/**
        - id: ms-citas
          uri: http://localhost:8082
          predicates:
            - Path=/api/citas/**
        - id: ms-odontologos
          uri: http://localhost:8083
          predicates:
            - Path=/api/odontologos/**
        - id: ms-tratamientos
          uri: http://localhost:8084
          predicates:
            - Path=/api/tratamientos/**
        - id: ms-facturas
          uri: http://localhost:8085
          predicates:
            - Path=/api/facturas/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
