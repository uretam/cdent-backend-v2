server:
  port: 9080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: ms-pacientes
          uri: http://localhost:9081
          predicates:
            - Path=/api/pacientes/**
        - id: ms-citas
          uri: http://localhost:9082
          predicates:
            - Path=/api/citas/**
        - id: ms-odontologos
          uri: http://localhost:9083
          predicates:
            - Path=/api/odontologos/**
        - id: ms-tratamientos
          uri: http://localhost:9084
          predicates:
            - Path=/api/tratamientos/**
        - id: ms-facturas
          uri: http://localhost:9085
          predicates:
            - Path=/api/facturas/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
